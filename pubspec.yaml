name: idea_notes
description: A cross-platform note app with handwriting OCR recognition.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # File System
  path_provider: ^2.1.1
  
  # OCR - Text Recognition (cross-platform alternative to Apple Vision)
  google_mlkit_text_recognition: ^0.11.0
  
  # Handwriting/Drawing - using built-in Flutter CustomPaint
  # pencildraw package doesn't exist, using CustomPainter instead
  
  # UI Components
  cupertino_icons: ^1.0.6
  intl: ^0.18.1
  uuid: ^4.2.1
  
  # Image handling
  image: ^4.1.3
  
  # UI Enhancements
  flutter_slidable: ^3.0.1
  flutter_colorpicker: ^1.0.3
  
  # Permissions
  permission_handler: ^11.1.0
  
  # Share & Export
  share_plus: ^7.2.1
  screenshot: ^2.1.0
  pdf: ^3.10.4
  printing: ^5.11.1
  
  # Path drawing for handwriting
  path_drawing: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
